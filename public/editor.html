<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬라이드 에디터</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #1e1e1e;
    color: #d4d4d4;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 상단 툴바 */
  .toolbar {
    height: 52px;
    background: #2d2d2d;
    border-bottom: 1px solid #3e3e3e;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .toolbar .logo {
    font-weight: 700;
    font-size: 0.95rem;
    color: #fff;
    margin-right: 20px;
    white-space: nowrap;
  }

  .toolbar select, .toolbar button {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }

  .toolbar select {
    padding: 6px 10px;
    background: #3e3e3e;
    color: #d4d4d4;
    border: 1px solid #555;
  }

  .tb-btn {
    padding: 7px 14px;
    background: #3e3e3e;
    color: #d4d4d4;
    border: 1px solid #555;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tb-btn:hover { background: #4e4e4e; }

  .tb-btn.primary {
    background: #2563eb;
    color: #fff;
    border-color: #2563eb;
  }

  .tb-btn.primary:hover { background: #1d4ed8; }

  .tb-btn.success {
    background: #16a34a;
    color: #fff;
    border-color: #16a34a;
  }

  .tb-btn.success:hover { background: #15803d; }

  .tb-btn.danger {
    background: #dc2626;
    color: #fff;
    border-color: #dc2626;
  }

  .tb-btn.danger:hover { background: #b91c1c; }

  .tb-spacer { flex: 1; }

  /* 메인 레이아웃 */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* 좌측 사이드바 - 썸네일 */
  .sidebar {
    width: 220px;
    background: #252526;
    border-right: 1px solid #3e3e3e;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid #3e3e3e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #999;
  }

  .sidebar-header button {
    background: #3e3e3e;
    border: none;
    color: #d4d4d4;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
  }

  .sidebar-header button:hover { background: #4e4e4e; }

  .thumb-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .thumb-list::-webkit-scrollbar { width: 6px; }
  .thumb-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  .thumb-item {
    position: relative;
    margin-bottom: 10px;
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }

  .thumb-item:hover { border-color: #555; }
  .thumb-item.active { border-color: #2563eb; }

  .thumb-preview {
    width: 100%;
    aspect-ratio: 16/9;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    font-size: 0.55rem;
    color: #888;
    text-align: center;
    line-height: 1.3;
    overflow: hidden;
    position: relative;
  }

  .thumb-preview .thumb-type {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(37,99,235,0.8);
    color: #fff;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.5rem;
    font-weight: 600;
  }

  .thumb-preview .thumb-title {
    font-size: 0.65rem;
    font-weight: 700;
    color: #ccc;
    max-height: 80%;
    overflow: hidden;
  }

  .thumb-num {
    position: absolute;
    bottom: 4px;
    right: 6px;
    font-size: 0.6rem;
    color: #666;
  }

  .thumb-delete {
    position: absolute;
    top: 3px;
    right: 3px;
    background: rgba(220,38,38,0.8);
    border: none;
    color: #fff;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.6rem;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .thumb-item:hover .thumb-delete { display: flex; }

  .thumb-actions {
    position: absolute;
    bottom: 3px;
    left: 3px;
    display: none;
    gap: 2px;
  }

  .thumb-item:hover .thumb-actions { display: flex; }

  .thumb-action-btn {
    background: rgba(37,99,235,0.85);
    border: none;
    color: #fff;
    width: 18px;
    height: 18px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.55rem;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .thumb-action-btn:hover { background: #2563eb; }

  /* 가운데 프리뷰 */
  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1e1e1e;
    padding: 30px;
    overflow: hidden;
  }

  .slide-preview {
    width: 100%;
    max-width: 960px;
    aspect-ratio: 16/9;
    background: #1e293b;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 50px;
  }

  .slide-preview.cover {
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    align-items: flex-start;
  }

  .slide-preview.section {
    background: linear-gradient(135deg, #1e40af, #2563eb);
    align-items: flex-start;
  }

  .slide-preview.ending {
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    align-items: center;
    text-align: center;
  }

  .slide-preview h1 {
    font-size: 2.2rem;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
  }

  .slide-preview .sub {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.7);
    margin-top: 8px;
  }

  .slide-preview h2 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #60a5fa;
    margin-bottom: 6px;
  }

  .slide-preview .section-h2 {
    font-size: 1.8rem;
    color: #fff;
  }

  .slide-preview .preview-line {
    width: 40px;
    height: 3px;
    background: #3b82f6;
    margin-bottom: 16px;
  }

  .slide-preview .preview-bullet {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 0.75rem;
    color: #cbd5e1;
    line-height: 1.5;
  }

  .slide-preview .preview-bullet .dot {
    width: 6px;
    height: 6px;
    min-width: 6px;
    border-radius: 50%;
    background: #3b82f6;
    margin-top: 5px;
  }

  .slide-preview .preview-cards {
    display: flex;
    gap: 10px;
    flex: 1;
    margin-top: 8px;
  }

  .slide-preview .pcard {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px;
    border-top: 3px solid #3b82f6;
  }

  .slide-preview .pcard h4 {
    font-size: 0.7rem;
    color: #60a5fa;
    margin-bottom: 6px;
  }

  .slide-preview .pcard p {
    font-size: 0.6rem;
    color: #94a3b8;
    line-height: 1.4;
  }

  .slide-preview .preview-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }

  .slide-preview .pstep {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slide-preview .pstep .num {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    background: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
  }

  .slide-preview .pstep .step-text h5 {
    font-size: 0.7rem;
    color: #e2e8f0;
  }

  .slide-preview .pstep .step-text p {
    font-size: 0.55rem;
    color: #94a3b8;
  }

  .slide-preview .stat-grid {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 12px;
  }

  .slide-preview .stat-item {
    text-align: center;
  }

  .slide-preview .stat-item .stat-val {
    font-size: 1.6rem;
    font-weight: 900;
    color: #60a5fa;
  }

  .slide-preview .stat-item .stat-lbl {
    font-size: 0.55rem;
    color: #94a3b8;
  }

  .slide-preview .two-col-preview {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }

  .slide-preview .two-col-preview .col {
    flex: 1;
  }

  .slide-preview .two-col-preview .col h4 {
    font-size: 0.7rem;
    color: #60a5fa;
    margin-bottom: 6px;
  }

  .slide-preview .section-num-bg {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 3rem;
    font-weight: 900;
    opacity: 0.15;
    color: #fff;
  }

  .slide-preview .ending-h2 {
    font-size: 1.8rem;
    font-weight: 900;
    color: #fff;
  }

  /* 우측 편집 패널 */
  .edit-panel {
    width: 340px;
    background: #252526;
    border-left: 1px solid #3e3e3e;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .edit-panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid #3e3e3e;
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
  }

  .edit-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .edit-panel-body::-webkit-scrollbar { width: 6px; }
  .edit-panel-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.75rem;
    color: #999;
    margin-bottom: 5px;
    font-weight: 500;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 8px 10px;
    background: #1e1e1e;
    border: 1px solid #3e3e3e;
    border-radius: 6px;
    color: #d4d4d4;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    border-color: #2563eb;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 60px;
  }

  .list-item-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: flex-start;
  }

  .list-item-row input,
  .list-item-row textarea {
    flex: 1;
    padding: 6px 8px;
    background: #1e1e1e;
    border: 1px solid #3e3e3e;
    border-radius: 4px;
    color: #d4d4d4;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    outline: none;
  }

  .list-item-row textarea {
    resize: vertical;
    min-height: 36px;
  }

  .list-item-row button {
    background: #dc2626;
    border: none;
    color: #fff;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.7rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .add-btn {
    width: 100%;
    padding: 6px;
    background: rgba(37,99,235,0.15);
    border: 1px dashed rgba(37,99,235,0.4);
    color: #60a5fa;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }

  .add-btn:hover {
    background: rgba(37,99,235,0.25);
    border-color: #2563eb;
  }

  .form-divider {
    height: 1px;
    background: #3e3e3e;
    margin: 16px 0;
  }

  .no-slide-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #666;
    font-size: 0.9rem;
  }

  /* 슬라이드 추가 모달 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: #2d2d2d;
    border-radius: 12px;
    border: 1px solid #3e3e3e;
    padding: 24px;
    width: 400px;
    max-width: 90vw;
  }

  .modal h3 {
    font-size: 1rem;
    color: #fff;
    margin-bottom: 16px;
  }

  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .type-option {
    padding: 12px;
    background: #1e1e1e;
    border: 1px solid #3e3e3e;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .type-option:hover {
    border-color: #2563eb;
    background: rgba(37,99,235,0.1);
  }

  .type-option .type-icon { font-size: 1.3rem; margin-bottom: 4px; }
  .type-option .type-name { font-size: 0.8rem; color: #d4d4d4; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #16a34a;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.85rem;
    z-index: 2000;
    transition: transform 0.3s;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #dc2626; }
</style>
</head>
<body>

<!-- 상단 툴바 -->
<div class="toolbar">
  <span class="logo">Slide Editor</span>
  <label style="font-size:0.8rem;color:#999;">Theme</label>
  <select id="themeSelect">
    <option value="modern">Modern Blue</option>
    <option value="light">Light</option>
    <option value="dark">Dark Mode</option>
    <option value="corporate">Corporate</option>
    <option value="warm">Warm Orange</option>
  </select>
  <div class="tb-spacer"></div>
  <button class="tb-btn" onclick="saveToLocal()">저장</button>
  <button class="tb-btn" onclick="loadFromLocal()">불러오기</button>
  <button class="tb-btn" onclick="exportJSON()">JSON 내보내기</button>
  <button class="tb-btn" onclick="importJSON()">JSON 가져오기</button>
  <button class="tb-btn primary" onclick="generateWeb()">웹 발표자료</button>
  <button class="tb-btn success" onclick="generatePPTX()">PPT 다운로드</button>
</div>

<!-- 메인 영역 -->
<div class="main">
  <!-- 좌측 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>슬라이드</span>
      <button onclick="showAddModal()">+ 추가</button>
    </div>
    <div class="thumb-list" id="thumbList"></div>
  </div>

  <!-- 가운데 프리뷰 -->
  <div class="preview-area">
    <div class="slide-preview" id="slidePreview">
      <div class="no-slide-msg">슬라이드를 선택하세요</div>
    </div>
  </div>

  <!-- 우측 편집 패널 -->
  <div class="edit-panel">
    <div class="edit-panel-header" id="editHeader">속성</div>
    <div class="edit-panel-body" id="editBody">
      <div class="no-slide-msg">슬라이드를 선택하면 편집할 수 있습니다</div>
    </div>
  </div>
</div>

<!-- 슬라이드 추가 모달 -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)hideAddModal()">
  <div class="modal">
    <h3>슬라이드 추가</h3>
    <div class="type-grid">
      <div class="type-option" onclick="addSlide('cover')">
        <div class="type-icon">🎬</div>
        <div class="type-name">표지</div>
      </div>
      <div class="type-option" onclick="addSlide('section')">
        <div class="type-icon">📑</div>
        <div class="type-name">섹션 구분</div>
      </div>
      <div class="type-option" onclick="addSlide('bullets')">
        <div class="type-icon">📝</div>
        <div class="type-name">불릿 포인트</div>
      </div>
      <div class="type-option" onclick="addSlide('cards')">
        <div class="type-icon">🃏</div>
        <div class="type-name">카드</div>
      </div>
      <div class="type-option" onclick="addSlide('steps')">
        <div class="type-icon">🔢</div>
        <div class="type-name">스텝</div>
      </div>
      <div class="type-option" onclick="addSlide('two-column')">
        <div class="type-icon">📊</div>
        <div class="type-name">2컬럼</div>
      </div>
      <div class="type-option" onclick="addSlide('stats')">
        <div class="type-icon">📈</div>
        <div class="type-name">통계 숫자</div>
      </div>
      <div class="type-option" onclick="addSlide('timeline')">
        <div class="type-icon">📅</div>
        <div class="type-name">타임라인</div>
      </div>
      <div class="type-option" onclick="addSlide('checklist')">
        <div class="type-icon">✅</div>
        <div class="type-name">체크리스트</div>
      </div>
      <div class="type-option" onclick="addSlide('quote')">
        <div class="type-icon">💬</div>
        <div class="type-name">인용구</div>
      </div>
      <div class="type-option" onclick="addSlide('progress')">
        <div class="type-icon">📊</div>
        <div class="type-name">프로그레스</div>
      </div>
      <div class="type-option" onclick="addSlide('pyramid')">
        <div class="type-icon">🔺</div>
        <div class="type-name">피라미드</div>
      </div>
      <div class="type-option" onclick="addSlide('icon-grid')">
        <div class="type-icon">🔲</div>
        <div class="type-name">아이콘 그리드</div>
      </div>
      <div class="type-option" onclick="addSlide('donut')">
        <div class="type-icon">🍩</div>
        <div class="type-name">도넛 차트</div>
      </div>
      <div class="type-option" onclick="addSlide('matrix')">
        <div class="type-icon">🔳</div>
        <div class="type-name">매트릭스</div>
      </div>
      <div class="type-option" onclick="addSlide('cycle')">
        <div class="type-icon">🔄</div>
        <div class="type-name">순환도</div>
      </div>
      <div class="type-option" onclick="addSlide('process-arrow')">
        <div class="type-icon">➡️</div>
        <div class="type-name">쉐브론</div>
      </div>
      <div class="type-option" onclick="addSlide('bar-chart')">
        <div class="type-icon">📶</div>
        <div class="type-name">막대 차트</div>
      </div>
      <div class="type-option" onclick="addSlide('highlight')">
        <div class="type-icon">💡</div>
        <div class="type-name">강조</div>
      </div>
      <div class="type-option" onclick="addSlide('swot')">
        <div class="type-icon">🧭</div>
        <div class="type-name">SWOT</div>
      </div>
      <div class="type-option" onclick="addSlide('roadmap')">
        <div class="type-icon">🗺️</div>
        <div class="type-name">로드맵</div>
      </div>
      <div class="type-option" onclick="addSlide('text')">
        <div class="type-icon">📄</div>
        <div class="type-name">텍스트</div>
      </div>
      <div class="type-option" onclick="addSlide('ending')">
        <div class="type-icon">🎯</div>
        <div class="type-name">마무리</div>
      </div>
    </div>
    <button class="tb-btn" style="width:100%;margin-top:14px;" onclick="hideAddModal()">취소</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input for JSON import -->
<input type="file" id="jsonFileInput" accept=".json" style="display:none">

<script>
// ============ 데이터 ============
let slides = [];
let selectedIndex = -1;

const SLIDE_TEMPLATES = {
  cover: () => ({ _type: 'cover', title: '발표 제목', subtitle: '부제목을 입력하세요', presenter: '발표자' }),
  section: () => ({ _type: 'section', isSection: true, sectionNumber: '01', title: '섹션 제목', description: '섹션 설명' }),
  bullets: () => ({ _type: 'bullets', type: 'bullets', title: '슬라이드 제목', items: ['첫 번째 항목', '두 번째 항목', '세 번째 항목'] }),
  cards: () => ({ _type: 'cards', type: 'cards', title: '슬라이드 제목', cards: [{ title: '카드 1', body: '카드 내용' }, { title: '카드 2', body: '카드 내용' }] }),
  steps: () => ({ _type: 'steps', type: 'steps', title: '슬라이드 제목', steps: [{ title: '단계 1', desc: '설명' }, { title: '단계 2', desc: '설명' }] }),
  'two-column': () => ({ _type: 'two-column', type: 'two-column', title: '슬라이드 제목', leftTitle: '왼쪽', rightTitle: '오른쪽', leftItems: ['항목 1'], rightItems: ['항목 1'] }),
  stats: () => ({ _type: 'stats', type: 'stats', title: '슬라이드 제목', stats: [{ value: 100, suffix: '%', label: '라벨' }] }),
  text: () => ({ _type: 'text', type: 'text', title: '슬라이드 제목', body: '여기에 내용을 입력하세요' }),
  timeline: () => ({ _type: 'timeline', type: 'timeline', title: '타임라인', events: [{ year: '2020', desc: '시작' }, { year: '2022', desc: '성장' }, { year: '2024', desc: '확장' }] }),
  checklist: () => ({ _type: 'checklist', type: 'checklist', title: '체크리스트', items: [{ text: '완료된 항목', done: true }, { text: '미완료 항목', done: false }] }),
  quote: () => ({ _type: 'quote', type: 'quote', title: '인용구', quote: '변화의 시작은 작은 한 걸음입니다.', author: '발표자' }),
  progress: () => ({ _type: 'progress', type: 'progress', title: '진행률', items: [{ label: '목표 달성률', value: 85, suffix: '%' }, { label: '고객 만족도', value: 92, suffix: '%' }] }),
  pyramid: () => ({ _type: 'pyramid', type: 'pyramid', title: '피라미드', levels: [{ title: '비전', desc: '최상위 목표' }, { title: '전략', desc: '실행 방안' }, { title: '실행', desc: '구체적 행동' }] }),
  'icon-grid': () => ({ _type: 'icon-grid', type: 'icon-grid', title: '핵심 요소', items: [{ title: '혁신', desc: '새로운 가치 창출' }, { title: '협업', desc: '팀워크 강화' }, { title: '성장', desc: '지속적 발전' }] }),
  donut: () => ({ _type: 'donut', type: 'donut', title: '도넛 차트', items: [{ value: 85, suffix: '%', label: '완료율' }, { value: 92, suffix: '%', label: '만족도' }] }),
  matrix: () => ({ _type: 'matrix', type: 'matrix', title: '매트릭스', cells: [{ title: '높은 영향 / 높은 긴급', body: '즉시 실행' }, { title: '높은 영향 / 낮은 긴급', body: '계획 수립' }, { title: '낮은 영향 / 높은 긴급', body: '위임' }, { title: '낮은 영향 / 낮은 긴급', body: '보류' }] }),
  cycle: () => ({ _type: 'cycle', type: 'cycle', title: '순환 프로세스', nodes: [{ title: 'Plan', desc: '계획' }, { title: 'Do', desc: '실행' }, { title: 'Check', desc: '확인' }, { title: 'Act', desc: '개선' }] }),
  'process-arrow': () => ({ _type: 'process-arrow', type: 'process-arrow', title: '프로세스', steps: [{ title: '분석', desc: '현황 파악' }, { title: '설계', desc: '방안 수립' }, { title: '실행', desc: '적용' }, { title: '평가', desc: '결과 확인' }] }),
  'bar-chart': () => ({ _type: 'bar-chart', type: 'bar-chart', title: '막대 차트', items: [{ label: '1분기', value: 45 }, { label: '2분기', value: 72 }, { label: '3분기', value: 88 }, { label: '4분기', value: 95 }] }),
  highlight: () => ({ _type: 'highlight', type: 'highlight', title: '핵심 메시지', body: '가장 중요한 메시지를 여기에', sub: '부가 설명', icon: '!' }),
  swot: () => ({ _type: 'swot', type: 'swot', title: 'SWOT 분석', strengths: ['강점 1'], weaknesses: ['약점 1'], opportunities: ['기회 1'], threats: ['위협 1'] }),
  roadmap: () => ({ _type: 'roadmap', type: 'roadmap', title: '로드맵', phases: [{ title: 'Phase 1', desc: '기반 구축', label: 'Q1' }, { title: 'Phase 2', desc: '확장', label: 'Q2' }, { title: 'Phase 3', desc: '안정화', label: 'Q3' }] }),
  ending: () => ({ _type: 'ending', title: '감사합니다', subtitle: '질문이 있으시면 말씀해주세요' })
};

// ============ 초기화 ============
function init() {
  // localStorage에서 불러오기
  const saved = localStorage.getItem('slideEditorData');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      slides = data.slides || [];
      if (data.theme) document.getElementById('themeSelect').value = data.theme;
    } catch(e) {}
  }

  // 슬라이드가 없으면 기본 세트
  if (slides.length === 0) {
    slides = [
      { _type: 'cover', title: '기업교육 발표자료', subtitle: 'AI 시대의 디지털 전환', presenter: '발표자명' },
      { _type: 'section', isSection: true, sectionNumber: '01', title: '첫 번째 섹션', description: '핵심 내용을 다룹니다' },
      { _type: 'bullets', type: 'bullets', title: '주요 포인트', items: ['핵심 내용 1: 중요한 사항을 설명합니다', '핵심 내용 2: 구체적인 예시를 들어봅니다', '핵심 내용 3: 실행 방안을 제시합니다'] },
      { _type: 'cards', type: 'cards', title: '핵심 전략', cards: [{ title: '전략 1', body: '구체적인 전략 내용을 작성합니다' }, { title: '전략 2', body: '두 번째 전략 내용입니다' }, { title: '전략 3', body: '세 번째 전략 내용입니다' }] },
      { _type: 'ending', title: '감사합니다', subtitle: '질문이 있으시면 말씀해주세요' }
    ];
  }

  renderThumbs();
  if (slides.length > 0) selectSlide(0);
}

// ============ 렌더링 ============
function renderThumbs() {
  const list = document.getElementById('thumbList');
  list.innerHTML = slides.map((s, i) => {
    const type = s._type || 'content';
    const title = s.title || '(제목 없음)';
    const typeLabel = { cover:'표지',section:'섹션',bullets:'불릿',cards:'카드',steps:'스텝','two-column':'2컬럼',stats:'통계',text:'텍스트',timeline:'타임라인',checklist:'체크',quote:'인용구',progress:'진행률',pyramid:'피라미드','icon-grid':'그리드',donut:'도넛',matrix:'매트릭스',cycle:'순환도','process-arrow':'쉐브론','bar-chart':'막대',highlight:'강조',swot:'SWOT',roadmap:'로드맵',ending:'마무리' }[type] || type;

    return `
    <div class="thumb-item ${i === selectedIndex ? 'active' : ''}" onclick="selectSlide(${i})" draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dropSlide(event,${i})">
      <div class="thumb-preview">
        <span class="thumb-type">${typeLabel}</span>
        <span class="thumb-title">${escHtml(title)}</span>
        <span class="thumb-num">${i + 1}</span>
      </div>
      <button class="thumb-delete" onclick="event.stopPropagation();deleteSlide(${i})">X</button>
      <div class="thumb-actions">
        ${i > 0 ? `<button class="thumb-action-btn" onclick="event.stopPropagation();moveSlide(${i},-1)" title="위로">▲</button>` : ''}
        ${i < slides.length - 1 ? `<button class="thumb-action-btn" onclick="event.stopPropagation();moveSlide(${i},1)" title="아래로">▼</button>` : ''}
        <button class="thumb-action-btn" onclick="event.stopPropagation();duplicateSlide(${i})" title="복제">⧉</button>
      </div>
    </div>`;
  }).join('');
}

function renderPreview() {
  const el = document.getElementById('slidePreview');
  if (selectedIndex < 0 || selectedIndex >= slides.length) {
    el.className = 'slide-preview';
    el.innerHTML = '<div class="no-slide-msg">슬라이드를 선택하세요</div>';
    return;
  }

  const s = slides[selectedIndex];
  const type = s._type || 'content';

  el.className = 'slide-preview';
  if (type === 'cover') el.classList.add('cover');
  else if (type === 'section') el.classList.add('section');
  else if (type === 'ending') el.classList.add('ending');

  let html = '';

  if (type === 'cover') {
    html = `<h1>${escHtml(s.title)}</h1>
      <div style="width:60px;height:3px;background:rgba(255,255,255,0.5);margin:12px 0;"></div>
      <div class="sub">${escHtml(s.subtitle || '')}</div>
      <div class="sub" style="margin-top:20px;opacity:0.5;font-size:0.8rem;">${escHtml(s.presenter || '')}</div>`;
  } else if (type === 'section') {
    html = `<span class="section-num-bg">${escHtml(s.sectionNumber || '')}</span>
      <h2 class="section-h2">${escHtml(s.title)}</h2>
      <div class="sub">${escHtml(s.description || '')}</div>`;
  } else if (type === 'ending') {
    html = `<h2 class="ending-h2">${escHtml(s.title || '감사합니다')}</h2>
      <div class="sub">${escHtml(s.subtitle || '')}</div>`;
  } else {
    html = `<h2>${escHtml(s.title)}</h2><div class="preview-line"></div>`;

    if (s.type === 'bullets') {
      html += (s.items || []).map(it => `<div class="preview-bullet"><span class="dot"></span><span>${escHtml(it)}</span></div>`).join('');
    } else if (s.type === 'cards') {
      html += `<div class="preview-cards">${(s.cards || []).map(c => `<div class="pcard"><h4>${escHtml(c.title)}</h4><p>${escHtml(c.body || '')}</p></div>`).join('')}</div>`;
    } else if (s.type === 'steps') {
      html += `<div class="preview-steps">${(s.steps || []).map((st, i) => `<div class="pstep"><div class="num">${i+1}</div><div class="step-text"><h5>${escHtml(typeof st === 'string' ? st : st.title)}</h5>${st.desc ? `<p>${escHtml(st.desc)}</p>` : ''}</div></div>`).join('')}</div>`;
    } else if (s.type === 'two-column') {
      html += `<div class="two-col-preview"><div class="col"><h4>${escHtml(s.leftTitle || '')}</h4>${(s.leftItems || []).map(it => `<div class="preview-bullet"><span class="dot"></span><span>${escHtml(it)}</span></div>`).join('')}</div><div class="col"><h4>${escHtml(s.rightTitle || '')}</h4>${(s.rightItems || []).map(it => `<div class="preview-bullet"><span class="dot"></span><span>${escHtml(it)}</span></div>`).join('')}</div></div>`;
    } else if (s.type === 'stats') {
      html += `<div class="stat-grid">${(s.stats || []).map(st => `<div class="stat-item"><div class="stat-val">${st.value}${escHtml(st.suffix || '')}</div><div class="stat-lbl">${escHtml(st.label)}</div></div>`).join('')}</div>`;
    } else if (s.type === 'timeline') {
      html += `<div style="display:flex;gap:8px;margin-top:8px">${(s.events || []).map(ev => `<div style="flex:1;text-align:center"><div style="width:8px;height:8px;border-radius:50%;background:#3b82f6;margin:0 auto 6px"></div><div style="font-size:0.6rem;font-weight:700;color:#60a5fa">${escHtml(ev.year||ev.label||'')}</div><div style="font-size:0.5rem;color:#94a3b8;margin-top:3px">${escHtml(ev.desc||ev.text||'')}</div></div>`).join('')}</div>`;
    } else if (s.type === 'checklist') {
      html += (s.items || []).map(it => { const isObj = typeof it === 'object'; const text = isObj ? it.text : it; const done = isObj ? it.done !== false : true; return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:0.65rem;color:#cbd5e1"><span style="width:14px;height:14px;border-radius:50%;background:${done?'#22c55e':'#555'};display:flex;align-items:center;justify-content:center;font-size:0.5rem;color:#fff">${done?'✓':''}</span>${escHtml(text)}</div>`; }).join('');
    } else if (s.type === 'quote') {
      html += `<div style="text-align:center;padding:8px"><div style="font-size:2rem;color:#60a5fa;line-height:1">"</div><div style="font-size:0.7rem;font-style:italic;color:#cbd5e1;margin:4px 0">${escHtml(s.quote||s.body||'')}</div><div style="font-size:0.55rem;color:#64748b">— ${escHtml(s.author||'')}</div></div>`;
    } else if (s.type === 'progress') {
      html += (s.items || []).map(it => `<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:0.55rem;color:#cbd5e1;margin-bottom:2px"><span>${escHtml(it.label)}</span><span style="color:#60a5fa">${it.value}${escHtml(it.suffix||'%')}</span></div><div style="height:6px;border-radius:3px;background:rgba(255,255,255,0.1)"><div style="height:100%;border-radius:3px;background:#3b82f6;width:${Math.min(it.value,100)}%"></div></div></div>`).join('');
    } else if (s.type === 'pyramid') {
      html += `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:6px">${(s.levels || []).map((lv, i, arr) => { const w = 30 + ((arr.length-1-i)/Math.max(arr.length-1,1))*70; return `<div style="width:${w}%;background:rgba(37,99,235,${0.7-i*0.12});border-radius:4px;padding:4px 8px;text-align:center"><div style="font-size:0.6rem;font-weight:700;color:#fff">${escHtml(typeof lv==='string'?lv:lv.title)}</div>${lv.desc?`<div style="font-size:0.45rem;color:rgba(255,255,255,0.6)">${escHtml(lv.desc)}</div>`:''}</div>`; }).join('')}</div>`;
    } else if (s.type === 'icon-grid') {
      html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px">${(s.items || []).map(it => `<div style="text-align:center;padding:6px;background:rgba(255,255,255,0.05);border-radius:6px"><div style="font-size:0.55rem;font-weight:700;color:#60a5fa">${escHtml(it.title)}</div><div style="font-size:0.45rem;color:#94a3b8">${escHtml(it.desc||'')}</div></div>`).join('')}</div>`;
    } else if (s.type === 'donut') {
      html += `<div style="display:flex;gap:16px;justify-content:center;margin-top:10px">${(s.items||[]).map(it=>`<div style="text-align:center"><div style="width:50px;height:50px;border-radius:50%;border:4px solid #3b82f6;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:800;color:#60a5fa;margin:0 auto 4px">${it.value}${escHtml(it.suffix||'%')}</div><div style="font-size:0.45rem;color:#94a3b8">${escHtml(it.label)}</div></div>`).join('')}</div>`;
    } else if (s.type === 'matrix') {
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px">${(s.cells||[]).slice(0,4).map(c=>`<div style="padding:6px;background:rgba(255,255,255,0.05);border-radius:4px"><div style="font-size:0.5rem;font-weight:700;color:#60a5fa">${escHtml(c.title)}</div><div style="font-size:0.4rem;color:#94a3b8">${escHtml(c.body||'')}</div></div>`).join('')}</div>`;
    } else if (s.type === 'cycle') {
      html += `<div style="display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:8px">${(s.nodes||[]).map((nd,i,arr)=>`<span style="font-size:0.55rem;padding:4px 8px;background:rgba(37,99,235,0.2);border-radius:4px;color:#60a5fa;font-weight:600">${escHtml(typeof nd==='string'?nd:nd.title)}</span>${i<arr.length-1?'<span style="font-size:0.6rem;color:#555">→</span>':''}`).join('')}</div>`;
    } else if (s.type === 'process-arrow') {
      html += `<div style="display:flex;gap:2px;margin-top:8px">${(s.steps||[]).map(st=>`<div style="flex:1;padding:6px;background:rgba(37,99,235,0.15);text-align:center;font-size:0.5rem;color:#cbd5e1;border-radius:3px"><strong style="color:#60a5fa">${escHtml(typeof st==='string'?st:st.title)}</strong></div>`).join('')}</div>`;
    } else if (s.type === 'bar-chart') {
      const items=s.items||[];const mx=Math.max(...items.map(i=>i.value),1);
      html += `<div style="display:flex;gap:6px;align-items:flex-end;height:60px;margin-top:8px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.1);position:relative">${items.map(it=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:0.45rem;color:#60a5fa">${it.value}</div><div style="width:80%;background:#3b82f6;border-radius:2px 2px 0 0;height:${Math.max((it.value/mx)*40,3)}px"></div><div style="font-size:0.4rem;color:#94a3b8;position:absolute;bottom:0">${escHtml(it.label)}</div></div>`).join('')}</div>`;
    } else if (s.type === 'highlight') {
      html += `<div style="text-align:center;padding:12px"><div style="font-size:1.5rem;margin-bottom:6px">${escHtml(s.icon||'!')}</div><div style="font-size:0.8rem;font-weight:700;color:#fff;line-height:1.4">${escHtml(s.body||s.message||'')}</div><div style="font-size:0.55rem;color:#94a3b8;margin-top:4px">${escHtml(s.sub||'')}</div></div>`;
    } else if (s.type === 'swot') {
      const colors=['#22c55e','#eab308','#ef4444','#3b82f6'];const labels=['S','W','O','T'];const keys=['strengths','weaknesses','opportunities','threats'];
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:6px">${keys.map((k,i)=>`<div style="padding:5px;border-radius:3px;border:1px solid ${colors[i]}30;background:${colors[i]}10"><div style="font-size:0.55rem;font-weight:800;color:${colors[i]}">${labels[i]}</div><div style="font-size:0.4rem;color:#94a3b8">${(s[k]||[]).join(', ')}</div></div>`).join('')}</div>`;
    } else if (s.type === 'roadmap') {
      html += `<div style="display:flex;gap:4px;margin-top:10px;position:relative"><div style="position:absolute;top:6px;left:10px;right:10px;height:2px;background:#3b82f640"></div>${(s.phases||[]).map(ph=>`<div style="flex:1;text-align:center"><div style="width:8px;height:8px;border-radius:50%;background:#3b82f6;margin:0 auto 6px;position:relative;z-index:1"></div><div style="font-size:0.5rem;font-weight:700;color:#60a5fa">${escHtml(ph.title)}</div><div style="font-size:0.4rem;color:#94a3b8">${escHtml(ph.desc||'')}</div></div>`).join('')}</div>`;
    } else {
      html += `<div style="font-size:0.75rem;color:#94a3b8;">${escHtml(s.body || '')}</div>`;
    }
  }

  el.innerHTML = html;
}

function renderEditPanel() {
  const header = document.getElementById('editHeader');
  const body = document.getElementById('editBody');

  if (selectedIndex < 0 || selectedIndex >= slides.length) {
    header.textContent = '속성';
    body.innerHTML = '<div class="no-slide-msg">슬라이드를 선택하면 편집할 수 있습니다</div>';
    return;
  }

  const s = slides[selectedIndex];
  const type = s._type || 'content';
  const typeLabel = { cover:'표지',section:'섹션 구분',bullets:'불릿 포인트',cards:'카드',steps:'스텝','two-column':'2컬럼',stats:'통계 숫자',text:'텍스트',timeline:'타임라인',checklist:'체크리스트',quote:'인용구',progress:'프로그레스',pyramid:'피라미드','icon-grid':'아이콘 그리드',donut:'도넛 차트',matrix:'매트릭스',cycle:'순환도','process-arrow':'쉐브론','bar-chart':'막대 차트',highlight:'강조',swot:'SWOT 분석',roadmap:'로드맵',ending:'마무리' }[type] || type;
  header.textContent = `#${selectedIndex + 1} ${typeLabel}`;

  let html = '';

  if (type === 'cover') {
    html = `
      <div class="form-group"><label>제목</label><textarea rows="2" onchange="updateField('title',this.value)">${escHtml(s.title)}</textarea></div>

    html += `<div class="form-divider"></div>
      <div class="form-group"><label>이미지</label>

      </div>`;
  }

  body.innerHTML = html;
}

// ============ 선택/조작 ============
function selectSlide(i) {
  selectedIndex = i;
  renderThumbs();
  renderPreview();
  renderEditPanel();
}

function deleteSlide(i) {
  if (slides.length <= 1) { showToast('최소 1개 슬라이드 필요', true); return; }
  slides.splice(i, 1);
  if (selectedIndex >= slides.length) selectedIndex = slides.length - 1;
  if (selectedIndex === i) {
    selectSlide(Math.min(i, slides.length - 1));
  } else {
    if (i < selectedIndex) selectedIndex--;
    renderThumbs();
    renderPreview();
    renderEditPanel();
  }
  autoSave();
}

function showAddModal() { document.getElementById('addModal').classList.add('show'); }
function hideAddModal() { document.getElementById('addModal').classList.remove('show'); }

function addSlide(type) {
  hideAddModal();
  const template = SLIDE_TEMPLATES[type];
  if (!template) return;
  const newSlide = template();
  const insertAt = selectedIndex >= 0 ? selectedIndex + 1 : slides.length;
  slides.splice(insertAt, 0, newSlide);
  selectSlide(insertAt);
  autoSave();
}

// ============ 공통 리스트 에디터 ============
function genericListEditor(s, field, label, renderItem, addFn) {
  let h = `<div class="form-group"><label>제목</label><textarea rows="2" onchange="updateField('title',this.value)">${escHtml(s.title)}</textarea></div><div class="form-divider"></div>
    <label style="font-size:0.75rem;color:#999;margin-bottom:8px;display:block;">${label}</label><div>`;
  (s[field] || []).forEach((it, i) => { h += renderItem(it, i); });
  h += `</div><button class="add-btn" onclick="${addFn()}">+ 추가</button>`;
  return h;
}
function updateGenericField(field, i, key, value) { if (selectedIndex<0)return; slides[selectedIndex][field][i][key]=value; renderPreview(); autoSave(); }
function updateGenericObjField(field, i, key, value) { if (selectedIndex<0)return; const it=slides[selectedIndex][field][i]; if(typeof it==='string')slides[selectedIndex][field][i]={title:it}; slides[selectedIndex][field][i][key]=value; renderPreview(); autoSave(); }
function removeGenericItem(field, i) { slides[selectedIndex][field].splice(i,1); renderPreview(); renderEditPanel(); autoSave(); }
function addGenericItem(field, template) { if(!slides[selectedIndex][field])slides[selectedIndex][field]=[]; slides[selectedIndex][field].push(template); renderPreview(); renderEditPanel(); autoSave(); }

// ============ SWOT ============
function updateSwotItem(key, i, value) { if(selectedIndex<0)return; slides[selectedIndex][key][i]=value; renderPreview(); autoSave(); }
function removeSwotItem(key, i) { slides[selectedIndex][key].splice(i,1); renderPreview(); renderEditPanel(); autoSave(); }
function addSwotItem(key) { if(!slides[selectedIndex][key])slides[selectedIndex][key]=[]; slides[selectedIndex][key].push('새 항목'); renderPreview(); renderEditPanel(); autoSave(); }

// ============ 타임라인 ============
function updateEventField(i, field, value) { if (selectedIndex < 0) return; slides[selectedIndex].events[i][field] = value; renderPreview(); autoSave(); }

function toggleCheckItem(i, checked) { if (selectedIndex < 0) return; const it = slides[selectedIndex].items[i]; if (typeof it === 'string') slides[selectedIndex].items[i] = { text: it, done: checked }; else it.done = checked; renderPreview(); autoSave(); }
function updateCheckText(i, value) { if (selectedIndex < 0) return; const it = slides[selectedIndex].items[i]; if (typeof it === 'string') slides[selectedIndex].items[i] = { text: value, done: true }; else it.text = value; renderPreview(); autoSave(); }
function removeCheckItem(i) { slides[selectedIndex].items.splice(i, 1); renderPreview(); renderEditPanel(); autoSave(); }
function addCheckItem() { if (!slides[selectedIndex].items) slides[selectedIndex].items = []; slides[selectedIndex].items.push({ text: '새 항목', done: false }); renderPreview(); renderEditPanel(); autoSave(); }

// ============ 복제/이동 ============
function duplicateSlide(i) {
  const clone = JSON.parse(JSON.stringify(slides[i]));
  slides.splice(i + 1, 0, clone);
  selectSlide(i + 1);
  autoSave();
  showToast('슬라이드 복제됨');
}

function moveSlide(i, dir) {
  const target = i + dir;
  if (target < 0 || target >= slides.length) return;
  const [moved] = slides.splice(i, 1);
  slides.splice(target, 0, moved);
  if (selectedIndex === i) selectedIndex = target;
  else if (i < selectedIndex && target >= selectedIndex) selectedIndex--;
  else if (i > selectedIndex && target <= selectedIndex) selectedIndex++;
  renderThumbs();
  renderPreview();
  renderEditPanel();
  autoSave();
}

// ============ 드래그 앤 드롭 ============
let dragIndex = -1;

function dragStart(e, i) {
  dragIndex = i;
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function dropSlide(e, targetIndex) {
  e.preventDefault();
  if (dragIndex < 0 || dragIndex === targetIndex) return;
  const [moved] = slides.splice(dragIndex, 1);
  slides.splice(targetIndex, 0, moved);
  if (selectedIndex === dragIndex) selectedIndex = targetIndex;
  else if (dragIndex < selectedIndex && targetIndex >= selectedIndex) selectedIndex--;
  else if (dragIndex > selectedIndex && targetIndex <= selectedIndex) selectedIndex++;
  dragIndex = -1;
  renderThumbs();
  renderPreview();
  renderEditPanel();
  autoSave();
}

// ============ 저장/로드 ============
function autoSave() {
  const theme = document.getElementById('themeSelect').value;
  localStorage.setItem('slideEditorData', JSON.stringify({ slides, theme }));
}

function saveToLocal() {
  autoSave();
  showToast('저장되었습니다');
}

function loadFromLocal() {
  const saved = localStorage.getItem('slideEditorData');
  if (!saved) { showToast('저장된 데이터가 없습니다', true); return; }
  try {
    const data = JSON.parse(saved);
    slides = data.slides || [];
    if (data.theme) document.getElementById('themeSelect').value = data.theme;
    selectedIndex = slides.length > 0 ? 0 : -1;
    renderThumbs();
    renderPreview();
    renderEditPanel();
    showToast('불러왔습니다');
  } catch(e) { showToast('데이터 오류', true); }
}

function exportJSON() {
  const jsonData = buildSlideJSON();
  const blob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'slides.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('JSON 내보내기 완료');
}

function importJSON() {
  document.getElementById('jsonFileInput').click();
}

document.getElementById('jsonFileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      loadFromJSON(data);
      showToast('JSON 가져오기 완료');
    } catch(err) { showToast('JSON 파싱 오류', true); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function loadFromJSON(data) {
  slides = [];

  // flat array format (직접 슬라이드 배열)
  if (Array.isArray(data)) {
    slides = data;
  }
  // { slides: [...] } 형식 (에디터 내보내기)
  else if (data.slides && Array.isArray(data.slides)) {
    slides = data.slides;
  }
  // { cover, content, ending } 형식 (생성기 JSON)
  else {
    if (data.cover) {
      slides.push({ _type: 'cover', ...data.cover });
    }

    if (data.content) {
      for (const section of data.content) {
        if (section.isSection) {
          slides.push({ _type: 'section', ...section });
        } else {
          slides.push({ _type: section.type || 'bullets', ...section });
        }
      }
    }

    if (data.ending) {
      slides.push({ _type: 'ending', ...data.ending });
    }
  }

  selectedIndex = slides.length > 0 ? 0 : -1;
  renderThumbs();
  renderPreview();
  renderEditPanel();
  autoSave();
}

// ============ 빌드 JSON ============
function buildSlideJSON() {
  const result = { cover: null, toc: [], content: [], ending: null };

  for (const s of slides) {
    const clean = { ...s };
    delete clean._type;

    if (s._type === 'cover') {
      result.cover = clean;
    } else if (s._type === 'ending') {
      result.ending = clean;
    } else if (s._type === 'section') {
      result.content.push(clean);
    } else {
      result.content.push(clean);
    }
  }

  return result;
}

// ============ 생성 ============
async function generateWeb() {
  const theme = document.getElementById('themeSelect').value;
  const jsonData = buildSlideJSON();
  const coverTitle = jsonData.cover?.title || 'presentation';
  const filename = coverTitle.replace(/[^a-zA-Z0-9가-힣]/g, '-').substring(0, 50) + '.html';

  try {
    const res = await fetch('/api/generate/web-from-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, slides: jsonData, theme })
    });
    const data = await res.json();
    if (data.error) { showToast('오류: ' + data.error, true); return; }
    showToast('웹 발표자료 생성 완료!');
    window.open(data.path, '_blank');
  } catch(e) { showToast('생성 실패: ' + e.message, true); }
}

async function generatePPTX() {
  const theme = document.getElementById('themeSelect').value;
  const jsonData = buildSlideJSON();
  const coverTitle = jsonData.cover?.title || 'presentation';
  const filename = coverTitle.replace(/[^a-zA-Z0-9가-힣]/g, '-').substring(0, 50) + '.pptx';

  try {
    const res = await fetch('/api/generate/pptx', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, slides: jsonData, theme })
    });
    const data = await res.json();
    if (data.error) { showToast('오류: ' + data.error, true); return; }
    showToast('PPT 생성 완료!');
    const a = document.createElement('a');
    a.href = '/' + data.path;
    a.download = filename;
    a.click();
  } catch(e) { showToast('생성 실패: ' + e.message, true); }
}

// ============ 유틸 ============
function escHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(t) {
  return escHtml(t);
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => el.classList.remove('show'), 2500);
}

// 테마 변경 시 자동저장
document.getElementById('themeSelect').addEventListener('change', autoSave);

// 키보드 단축키
document.addEventListener('keydown', (e) => {
  // 입력 중일 때는 단축키 무시
  const tag = e.target.tagName;
  const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveToLocal();
  }
  if (e.ctrlKey && e.key === 'd' && selectedIndex >= 0) {
    e.preventDefault();
    duplicateSlide(selectedIndex);
  }
  if (e.key === 'Escape') {
    hideAddModal();
  }
  if (!isTyping && e.key === 'ArrowUp' && selectedIndex > 0) {
    e.preventDefault();
    selectSlide(selectedIndex - 1);
  }
  if (!isTyping && e.key === 'ArrowDown' && selectedIndex < slides.length - 1) {
    e.preventDefault();
    selectSlide(selectedIndex + 1);
  }
});

// 초기화
init();
