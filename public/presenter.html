<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발표자 모드 - 기업교육 발표자료</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 상단 헤더 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(22, 22, 42, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-title {
    font-size: 14px;
    font-weight: 700;
    color: #a78bfa;
  }
  .slide-counter {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .slide-counter .total {
    color: #666;
    font-weight: 400;
  }
  .header-center {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* 현재 시각 */
  .clock-display {
    font-size: 16px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: #94a3b8;
    letter-spacing: 1px;
  }

  /* 타이머 */
  .timer-section {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .timer-display {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff;
    letter-spacing: 2px;
  }
  .timer-controls {
    display: flex;
    gap: 4px;
  }
  .timer-btn {
    background: rgba(42, 42, 74, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    color: #ccc;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s;
  }
  .timer-btn:hover { background: rgba(58, 58, 90, 0.8); }
  .timer-btn.active { background: #4c1d95; border-color: #7c3aed; color: #fff; }

  /* 목표시간 설정 */
  .target-section {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
  }
  .target-input {
    width: 50px;
    background: rgba(42, 42, 74, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
    color: #fff;
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 12px;
    text-align: center;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .target-input:focus { outline: none; border-color: #7c3aed; }
  .remaining-display {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: #888;
    margin-left: 4px;
  }
  .remaining-display.warning { color: #f59e0b; font-weight: 600; }
  .remaining-display.danger { color: #ef4444; font-weight: 700; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* 진행률 바 */
  .progress-bar-container {
    height: 3px;
    background: #2a2a4a;
    flex-shrink: 0;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #a78bfa);
    transition: width 0.3s ease;
    border-radius: 0 2px 2px 0;
  }
  .progress-bar.warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .progress-bar.danger { background: linear-gradient(90deg, #ef4444, #f87171); }

  /* 시간 알림 토스트 */
  .time-alert {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .time-alert.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .time-alert.info {
    background: rgba(96, 165, 250, 0.9);
    color: #fff;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .time-alert.warn {
    background: rgba(245, 158, 11, 0.9);
    color: #fff;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .time-alert.critical {
    background: rgba(239, 68, 68, 0.9);
    color: #fff;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* 메인 레이아웃 */
  .main-layout {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }

  /* 글래스모피즘 패널 공통 */
  .glass-panel {
    background: rgba(22, 22, 42, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }

  /* 현재 슬라이드 패널 */
  .current-slide-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .current-slide-frame {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 0;
  }
  .current-slide-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 8px;
    background: #000;
  }

  /* 오른쪽 패널 */
  .right-panels {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  /* 다음 슬라이드 패널 */
  .next-slide-panel {
    flex: 0 0 auto;
    height: 240px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .next-slide-frame {
    flex: 1;
    padding: 8px;
    min-height: 0;
  }
  .next-slide-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 6px;
    background: #000;
    opacity: 0.7;
  }
  .next-slide-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 13px;
  }

  /* 발표자 노트 패널 */
  .notes-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .notes-content {
    flex: 1;
    padding: 12px 14px;
    overflow-y: auto;
    line-height: 1.8;
    color: #ccc;
    white-space: pre-wrap;
    word-break: break-word;
    transition: font-size 0.2s;
  }
  .notes-content::-webkit-scrollbar { width: 6px; }
  .notes-content::-webkit-scrollbar-track { background: transparent; }
  .notes-content::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
  .notes-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 13px;
  }

  /* 폰트 크기 조절 버튼 */
  .font-controls {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .font-btn {
    background: rgba(42, 42, 74, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
    color: #aaa;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .font-btn:hover { background: rgba(58, 58, 90, 0.8); color: #fff; }
  .font-size-label {
    font-size: 10px;
    color: #666;
    min-width: 28px;
    text-align: center;
  }

  /* 연결 상태 표시 */
  .connection-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
  }
  .status-dot.connected { background: #22c55e; }
  .status-text { color: #888; }

  /* 대기 화면 */
  .waiting-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: #666;
  }
  .waiting-screen .icon {
    font-size: 48px;
    opacity: 0.3;
  }
  .waiting-screen .message {
    font-size: 16px;
  }
  .waiting-screen .hint {
    font-size: 12px;
    color: #555;
    max-width: 400px;
    text-align: center;
    line-height: 1.6;
  }

  /* 미니 슬라이드 도트 네비게이터 */
  .slide-dots-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 6px 16px;
    background: rgba(18, 18, 42, 0.7);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    flex-wrap: wrap;
    max-height: 40px;
    overflow: hidden;
  }
  .slide-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .slide-dot:hover {
    background: rgba(167, 139, 250, 0.5);
    transform: scale(1.3);
  }
  .slide-dot.active {
    background: #a78bfa;
    border-color: #a78bfa;
    transform: scale(1.3);
    box-shadow: 0 0 6px rgba(167, 139, 250, 0.5);
  }
  .slide-dot.visited {
    background: rgba(167, 139, 250, 0.3);
  }

  /* 키보드 단축키 도움말 */
  .shortcuts-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 6px 16px;
    background: rgba(18, 18, 42, 0.7);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    font-size: 11px;
    color: #666;
  }
  .shortcut {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  kbd {
    background: rgba(42, 42, 74, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: monospace;
    color: #aaa;
  }
</style>
</head>
<body>

<!-- 시간 알림 토스트 -->
<div class="time-alert" id="timeAlert"></div>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <span class="header-title">발표자 모드</span>
    <div class="slide-counter">
      <span id="currentNum">-</span>
      <span class="total"> / <span id="totalNum">-</span></span>
    </div>
  </div>
  <div class="header-center">
    <span class="clock-display" id="clockDisplay">--:--:--</span>
  </div>
  <div class="header-right">
    <div class="target-section">
      <span>목표</span>
      <input type="number" id="targetMinutes" class="target-input" value="30" min="1" max="999">
      <span>분</span>
      <span class="remaining-display" id="remainingDisplay"></span>
    </div>
    <div class="timer-section">
      <span class="timer-display" id="timerDisplay">00:00:00</span>
      <div class="timer-controls">
        <button class="timer-btn" id="btnTimerToggle" title="시작/일시정지">시작</button>
        <button class="timer-btn" id="btnTimerReset" title="초기화">리셋</button>
      </div>
    </div>
    <div class="connection-status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">연결 대기</span>
    </div>
  </div>
</div>

<!-- 진행률 바 -->
<div class="progress-bar-container">
  <div class="progress-bar" id="progressBar" style="width: 0%"></div>
</div>

<!-- 메인 영역 -->
<div class="main-layout" id="mainLayout">
  <!-- 대기 화면 (연결 전) -->
  <div class="waiting-screen" id="waitingScreen" style="grid-column: 1 / -1;">
    <div class="icon">&#128247;</div>
    <div class="message">발표자료 윈도우를 열어주세요</div>
    <div class="hint">
      output/web 폴더의 HTML 발표자료를 브라우저에서 열면 자동으로 연결됩니다.<br>
      연결 후 이 화면에서 슬라이드를 조작할 수 있습니다.
    </div>
  </div>

  <!-- 현재 슬라이드 (연결 후 표시) -->
  <div class="current-slide-panel glass-panel" id="currentSlidePanel" style="display:none;">
    <div class="panel-header">현재 슬라이드</div>
    <div class="current-slide-frame">
      <iframe id="currentSlideFrame" sandbox="allow-same-origin"></iframe>
    </div>
  </div>

  <!-- 오른쪽: 다음 슬라이드 + 노트 -->
  <div class="right-panels" id="rightPanels" style="display:none;">
    <div class="next-slide-panel glass-panel">
      <div class="panel-header">다음 슬라이드</div>
      <div class="next-slide-frame" id="nextSlideContainer">
        <iframe id="nextSlideFrame" sandbox="allow-same-origin"></iframe>
      </div>
    </div>
    <div class="notes-panel glass-panel">
      <div class="panel-header">
        <span>발표자 노트</span>
        <div class="font-controls">
          <button class="font-btn" id="btnFontMinus" title="글꼴 축소">-</button>
          <span class="font-size-label" id="fontSizeLabel">15px</span>
          <button class="font-btn" id="btnFontPlus" title="글꼴 확대">+</button>
        </div>
      </div>
      <div class="notes-content" id="notesContent" style="font-size: 15px;"></div>
    </div>
  </div>
</div>

<!-- 미니 슬라이드 도트 네비게이터 -->
<div class="slide-dots-bar" id="slideDotsBar" style="display:none;"></div>

<!-- 단축키 안내 -->
<div class="shortcuts-bar">
  <span class="shortcut"><kbd>&larr;</kbd> 이전</span>
  <span class="shortcut"><kbd>&rarr;</kbd> <kbd>Space</kbd> <kbd>Enter</kbd> 다음</span>
  <span class="shortcut"><kbd>Home</kbd> 처음</span>
  <span class="shortcut"><kbd>End</kbd> 마지막</span>
  <span class="shortcut"><kbd>T</kbd> 타이머 시작/정지</span>
  <span class="shortcut"><kbd>+</kbd> <kbd>-</kbd> 노트 크기</span>
</div>

<script>
(function() {
  'use strict';

  // === XSS 방지 ===
  function escHtml(str) {
    if (typeof str !== 'string') return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
    return str.replace(/[&<>"']/g, c => map[c]);
  }

  // === 상태 ===
  let currentSlide = 0;
  let totalSlides = 0;
  let slidesData = []; // { html, notes }[]
  let connected = false;
  let visitedSlides = new Set();

  // 타이머
  let timerRunning = false;
  let timerSeconds = 0;
  let timerInterval = null;

  // 시간 알림 상태
  let alertShown = { 10: false, 5: false, 1: false };

  // 노트 폰트 크기
  let notesFontSize = 15;

  // DOM
  const currentNum = document.getElementById('currentNum');
  const totalNum = document.getElementById('totalNum');
  const clockDisplay = document.getElementById('clockDisplay');
  const timerDisplay = document.getElementById('timerDisplay');
  const btnTimerToggle = document.getElementById('btnTimerToggle');
  const btnTimerReset = document.getElementById('btnTimerReset');
  const targetMinutes = document.getElementById('targetMinutes');
  const remainingDisplay = document.getElementById('remainingDisplay');
  const progressBar = document.getElementById('progressBar');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const waitingScreen = document.getElementById('waitingScreen');
  const currentSlidePanel = document.getElementById('currentSlidePanel');
  const rightPanels = document.getElementById('rightPanels');
  const currentSlideFrame = document.getElementById('currentSlideFrame');
  const nextSlideFrame = document.getElementById('nextSlideFrame');
  const nextSlideContainer = document.getElementById('nextSlideContainer');
  const notesContent = document.getElementById('notesContent');
  const slideDotsBar = document.getElementById('slideDotsBar');
  const timeAlert = document.getElementById('timeAlert');
  const btnFontMinus = document.getElementById('btnFontMinus');
  const btnFontPlus = document.getElementById('btnFontPlus');
  const fontSizeLabel = document.getElementById('fontSizeLabel');

  // === 현재 시각 표시 ===
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    clockDisplay.textContent = h + ':' + m + ':' + s;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // === BroadcastChannel ===
  const channel = new BroadcastChannel('presentation-sync');

  channel.onmessage = function(event) {
    const msg = event.data;
    if (!msg || !msg.type) return;

    switch (msg.type) {
      case 'init':
        handleInit(msg);
        break;
      case 'slideChange':
        if (typeof msg.index === 'number') {
          currentSlide = msg.index;
          visitedSlides.add(currentSlide);
          updateDisplay();
        }
        break;
      case 'ping':
        channel.postMessage({ type: 'pong', from: 'presenter' });
        break;
      case 'pong':
        setConnected(true);
        break;
      case 'disconnect':
        setConnected(false);
        showWaiting();
        break;
    }
  };

  // 주기적으로 연결 요청
  function requestConnection() {
    channel.postMessage({ type: 'requestInit', from: 'presenter' });
  }
  setInterval(requestConnection, 2000);
  requestConnection();

  function handleInit(msg) {
    if (msg.slides && Array.isArray(msg.slides)) {
      slidesData = msg.slides;
      totalSlides = slidesData.length;
      currentSlide = typeof msg.currentIndex === 'number' ? msg.currentIndex : 0;
      visitedSlides.add(currentSlide);
      setConnected(true);
      showPresentation();
      buildDots();
      updateDisplay();
    }
  }

  function setConnected(state) {
    connected = state;
    statusDot.classList.toggle('connected', state);
    statusText.textContent = state ? '연결됨' : '연결 대기';
  }

  function showWaiting() {
    waitingScreen.style.display = '';
    waitingScreen.style.gridColumn = '1 / -1';
    currentSlidePanel.style.display = 'none';
    rightPanels.style.display = 'none';
    slideDotsBar.style.display = 'none';
  }

  function showPresentation() {
    waitingScreen.style.display = 'none';
    currentSlidePanel.style.display = '';
    rightPanels.style.display = '';
    slideDotsBar.style.display = 'flex';
  }

  // === 미니 슬라이드 도트 네비게이터 ===
  function buildDots() {
    slideDotsBar.innerHTML = '';
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement('div');
      dot.className = 'slide-dot';
      dot.title = '슬라이드 ' + (i + 1);
      dot.addEventListener('click', (function(idx) {
        return function() { goToSlide(idx); };
      })(i));
      slideDotsBar.appendChild(dot);
    }
    updateDots();
  }

  function updateDots() {
    const dots = slideDotsBar.querySelectorAll('.slide-dot');
    dots.forEach(function(dot, i) {
      dot.classList.toggle('active', i === currentSlide);
      dot.classList.toggle('visited', !dot.classList.contains('active') && visitedSlides.has(i));
    });
  }

  // === 슬라이드 표시 ===
  function updateDisplay() {
    // 슬라이드 번호
    currentNum.textContent = totalSlides > 0 ? (currentSlide + 1) : '-';
    totalNum.textContent = totalSlides > 0 ? totalSlides : '-';

    if (totalSlides === 0) return;

    // 현재 슬라이드 iframe
    const cur = slidesData[currentSlide];
    if (cur && cur.html) {
      renderSlideInFrame(currentSlideFrame, cur.html);
    }

    // 다음 슬라이드
    const nextIdx = currentSlide + 1;
    if (nextIdx < totalSlides && slidesData[nextIdx]) {
      nextSlideFrame.style.display = '';
      renderSlideInFrame(nextSlideFrame, slidesData[nextIdx].html);
      var emptyMsg = nextSlideContainer.querySelector('.next-slide-empty');
      if (emptyMsg) emptyMsg.remove();
      nextSlideFrame.style.display = '';
    } else {
      nextSlideFrame.style.display = 'none';
      var emptyMsg = nextSlideContainer.querySelector('.next-slide-empty');
      if (!emptyMsg) {
        emptyMsg = document.createElement('div');
        emptyMsg.className = 'next-slide-empty';
        emptyMsg.textContent = '마지막 슬라이드입니다';
        nextSlideContainer.appendChild(emptyMsg);
      }
    }

    // 발표자 노트
    var notes = cur && cur.notes ? cur.notes : '';
    if (notes) {
      notesContent.textContent = notes;
      notesContent.classList.remove('notes-empty');
    } else {
      notesContent.textContent = '';
      notesContent.innerHTML = '<div class="notes-empty">이 슬라이드에 노트가 없습니다</div>';
    }

    // 도트 업데이트
    updateDots();
  }

  function renderSlideInFrame(iframe, html) {
    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
    } catch (e) {
      iframe.srcdoc = html;
    }
  }

  // === 슬라이드 이동 ===
  function goToSlide(index) {
    if (totalSlides === 0) return;
    var newIndex = Math.max(0, Math.min(index, totalSlides - 1));
    if (newIndex === currentSlide) return;
    currentSlide = newIndex;
    visitedSlides.add(currentSlide);
    updateDisplay();
    channel.postMessage({ type: 'goToSlide', index: currentSlide, from: 'presenter' });
  }

  function nextSlide() { goToSlide(currentSlide + 1); }
  function prevSlide() { goToSlide(currentSlide - 1); }
  function firstSlide() { goToSlide(0); }
  function lastSlide() { goToSlide(totalSlides - 1); }

  // === 타이머 ===
  function updateTimerDisplay() {
    var h = Math.floor(timerSeconds / 3600);
    var m = Math.floor((timerSeconds % 3600) / 60);
    var s = timerSeconds % 60;
    timerDisplay.textContent =
      String(h).padStart(2, '0') + ':' +
      String(m).padStart(2, '0') + ':' +
      String(s).padStart(2, '0');

    // 진행률 바 업데이트
    var target = parseInt(targetMinutes.value, 10) || 30;
    var targetSec = target * 60;
    var pct = Math.min((timerSeconds / targetSec) * 100, 100);
    progressBar.style.width = pct + '%';
    progressBar.classList.remove('warning', 'danger');
    if (pct >= 100) {
      progressBar.classList.add('danger');
    } else if (pct >= 80) {
      progressBar.classList.add('warning');
    }

    // 남은 시간 표시
    var remainSec = targetSec - timerSeconds;
    if (timerRunning || timerSeconds > 0) {
      if (remainSec <= 0) {
        var overSec = Math.abs(remainSec);
        var overM = Math.floor(overSec / 60);
        var overS = overSec % 60;
        remainingDisplay.textContent = '(초과 +' + String(overM).padStart(2, '0') + ':' + String(overS).padStart(2, '0') + ')';
        remainingDisplay.className = 'remaining-display danger';
      } else {
        var remM = Math.floor(remainSec / 60);
        var remS = remainSec % 60;
        remainingDisplay.textContent = '(남은 시간 ' + String(remM).padStart(2, '0') + ':' + String(remS).padStart(2, '0') + ')';
        if (remainSec <= 60) {
          remainingDisplay.className = 'remaining-display danger';
        } else if (remainSec <= 300) {
          remainingDisplay.className = 'remaining-display warning';
        } else {
          remainingDisplay.className = 'remaining-display';
        }
      }
    } else {
      remainingDisplay.textContent = '';
      remainingDisplay.className = 'remaining-display';
    }

    // 시간 알림 체크
    checkTimeAlerts(remainSec);
  }

  // === 시간 경과 알림 ===
  function checkTimeAlerts(remainSec) {
    var remainMin = Math.floor(remainSec / 60);
    // 10분 남음
    if (!alertShown[10] && remainSec <= 600 && remainSec > 540 && timerRunning) {
      showTimeAlert('10분 남았습니다', 'info');
      alertShown[10] = true;
    }
    // 5분 남음
    if (!alertShown[5] && remainSec <= 300 && remainSec > 240 && timerRunning) {
      showTimeAlert('5분 남았습니다', 'warn');
      alertShown[5] = true;
    }
    // 1분 남음
    if (!alertShown[1] && remainSec <= 60 && remainSec > 0 && timerRunning) {
      showTimeAlert('1분 남았습니다!', 'critical');
      alertShown[1] = true;
    }
  }

  function showTimeAlert(message, type) {
    timeAlert.textContent = message;
    timeAlert.className = 'time-alert ' + type + ' show';
    setTimeout(function() {
      timeAlert.classList.remove('show');
    }, 3000);
  }

  function toggleTimer() {
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      btnTimerToggle.textContent = '시작';
      btnTimerToggle.classList.remove('active');
    } else {
      timerInterval = setInterval(function() {
        timerSeconds++;
        updateTimerDisplay();
      }, 1000);
      timerRunning = true;
      btnTimerToggle.textContent = '정지';
      btnTimerToggle.classList.add('active');
    }
  }

  function resetTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = 0;
    btnTimerToggle.textContent = '시작';
    btnTimerToggle.classList.remove('active');
    alertShown = { 10: false, 5: false, 1: false };
    updateTimerDisplay();
  }

  btnTimerToggle.addEventListener('click', toggleTimer);
  btnTimerReset.addEventListener('click', resetTimer);

  // === 폰트 크기 조절 ===
  function updateFontSize() {
    notesContent.style.fontSize = notesFontSize + 'px';
    fontSizeLabel.textContent = notesFontSize + 'px';
  }

  btnFontPlus.addEventListener('click', function() {
    if (notesFontSize < 32) {
      notesFontSize += 2;
      updateFontSize();
    }
  });

  btnFontMinus.addEventListener('click', function() {
    if (notesFontSize > 10) {
      notesFontSize -= 2;
      updateFontSize();
    }
  });

  // === 키보드 ===
  document.addEventListener('keydown', function(e) {
    // 입력 필드에 포커스 중이면 무시
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch (e.key) {
      case 'ArrowRight':
      case ' ':
      case 'Enter':
        e.preventDefault();
        nextSlide();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        prevSlide();
        break;
      case 'Home':
        e.preventDefault();
        firstSlide();
        break;
      case 'End':
        e.preventDefault();
        lastSlide();
        break;
      case 't':
      case 'T':
        e.preventDefault();
        toggleTimer();
        break;
      case '+':
      case '=':
        e.preventDefault();
        if (notesFontSize < 32) { notesFontSize += 2; updateFontSize(); }
        break;
      case '-':
      case '_':
        e.preventDefault();
        if (notesFontSize > 10) { notesFontSize -= 2; updateFontSize(); }
        break;
    }
  });

  // 초기 타이머 표시
  updateTimerDisplay();

})();
</script>
</body>
</html>
